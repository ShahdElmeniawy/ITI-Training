<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center mb-4">Login</h3>

                        <form class="needs-validation" novalidate>

                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" required>

                                <div class="invalid-feedback">
                                    Username must be at least 5 letters and contain letters only.
                                </div>

                                <div id="nameAlert" class="alert alert-danger alert-dismissible mt-2 d-none"
                                    role="alert">
                                    Name should be more than 5 letters (letters only).
                                    <button type="button" class="btn-close"></button>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required>
                                <div class="invalid-feedback">
                                    Password is required.
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Login
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const usernameInput = document.getElementById("username");
        const nameAlert = document.getElementById("nameAlert");
        const closeBtn = nameAlert.querySelector(".btn-close");

        const usernameRegex = /^[A-Za-z]{5,}$/;

        function validateUsername() {
            const value = usernameInput.value.trim();

            if (!usernameRegex.test(value)) {
                nameAlert.classList.remove("d-none");
                usernameInput.classList.add("is-invalid");
                usernameInput.classList.remove("is-valid");
                return false;
            } else {
                nameAlert.classList.add("d-none");
                usernameInput.classList.remove("is-invalid");
                usernameInput.classList.add("is-valid");
                return true;
            }
        }

        usernameInput.addEventListener("blur", validateUsername);

        closeBtn.addEventListener("click", () => {
            nameAlert.classList.add("d-none");
        });

        (() => {
            const forms = document.querySelectorAll('.needs-validation');

            forms.forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity() || !validateUsername()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                });
            });
        })();
    </script>

</body>

</html>
