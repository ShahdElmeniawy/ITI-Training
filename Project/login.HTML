<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="./style/style.css">
    <link rel="icon" type="image/x-icon" href="./resources/logo.png">

</head>

<body>
    <div class="continer">
        <img src="./resources/wickedbackground.png" class="signWave">
        <img src="./resources/Tablet login-cuate.png" class="signImg">
        <form action="./index.HTML" id="loginForm" class="logForm">
            <label for="userName"> Name </label>
            <input type="text" id="userName" required>
            <label for="password"> Password </label>
            <input type="password" id="password" required>
            <input type="submit" value="Submit">
            <div id="InvalidText">Username or Password is incorrect</div>
            <a href="./signup.HTML">Create new account</a>
        </form>
    </div>
    <script src="./js/login.js"></script>
</body>

</html>
